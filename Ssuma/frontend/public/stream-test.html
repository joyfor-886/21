<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Stream Test</title></head>
<body>
<h1>SSE Stream Test</h1>
<input id="msg" value="你好" style="width:300px">
<button onclick="test()">Send</button>
<pre id="out"></pre>
<script>
async function test() {
  const out = document.getElementById('out')
  const msg = document.getElementById('msg').value
  out.textContent = 'Sending...'
  const ctrl = new AbortController()
  try {
    const r = await fetch('http://localhost:8000/api/v1/flow/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ project_id: '', message: msg }),
      signal: ctrl.signal,
    })
    out.textContent = 'Status: ' + r.status + ', reading stream...\n'
    const reader = r.body.getReader()
    const dec = new TextDecoder()
    while (true) {
      const { done, value } = await reader.read()
      if (done) { out.textContent += '\n[DONE]'; break }
      out.textContent += dec.decode(value, { stream: true })
    }
  } catch(e) {
    out.textContent += '\nERROR: ' + e.name + ': ' + e.message
  }
}
</script>
</body></html>
